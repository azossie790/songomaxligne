<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SONGO — Jeu en Ligne</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --terre: #8B4513;
    --terre-clair: #C4772A;
    --or: #D4A017;
    --or-clair: #F0C040;
    --bois: #3D1C02;
    --bois-moyen: #5C2E0A;
    --sable: #F5E6C8;
    --sable-fonce: #E8D5A3;
    --vert: #2D6A2D;
    --rouge: #C0392B;
    --bleu: #1A5276;
    --gris: #7F8C8D;
    --blanc: #FDFAF4;
    --ombre: rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bois);
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(93,46,10,0.8) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(93,46,10,0.8) 0%, transparent 60%);
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    color: var(--sable);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--or-clair);
    text-shadow: 0 0 30px rgba(212,160,23,0.6), 2px 2px 0 var(--bois-moyen);
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--sable-fonce);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0.7;
  }

  /* ─ ÉCRAN CONNEXION ─ */
  #ecran-connexion {
    background: linear-gradient(135deg, var(--bois-moyen), #2A1200);
    border: 2px solid var(--terre-clair);
    border-radius: 16px;
    padding: 36px 40px;
    width: min(420px, 100%);
    box-shadow: 0 8px 40px var(--ombre), inset 0 1px 0 rgba(212,160,23,0.2);
    text-align: center;
  }

  #ecran-connexion h2 {
    font-family: 'Cinzel Decorative', serif;
    color: var(--or);
    font-size: 1.2rem;
    margin-bottom: 24px;
  }

  .champ-groupe {
    margin-bottom: 16px;
    text-align: left;
  }

  .champ-groupe label {
    display: block;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--or);
    margin-bottom: 6px;
  }

  .champ-groupe input, .champ-groupe select {
    width: 100%;
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--terre-clair);
    border-radius: 8px;
    color: var(--sable);
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s;
  }

  .champ-groupe input:focus, .champ-groupe select:focus {
    outline: none;
    border-color: var(--or);
    background: rgba(212,160,23,0.08);
  }

  .champ-groupe select option { background: var(--bois-moyen); }

  .btn-primaire {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--terre-clair), var(--or));
    border: none;
    border-radius: 10px;
    color: var(--bois);
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(196,119,42,0.4);
  }

  .btn-primaire:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(196,119,42,0.5); }
  .btn-primaire:active { transform: translateY(0); }

  .aide-connexion {
    margin-top: 16px;
    font-size: 0.8rem;
    color: var(--sable-fonce);
    opacity: 0.6;
    line-height: 1.5;
  }

  /* ─ JEU ─ */
  #ecran-jeu { display: none; width: min(700px, 100%); }

  .infos-jeu {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 10px 16px;
    border: 1px solid rgba(196,119,42,0.3);
  }

  .badge-joueur {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
  }

  .badge-joueur .point {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .badge-joueur.sud .point { background: var(--terre-clair); }
  .badge-joueur.nord .point { background: var(--bleu); }

  .badge-score {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.4rem;
    color: var(--or-clair);
  }

  .badge-tour {
    font-size: 0.78rem;
    background: rgba(212,160,23,0.15);
    border: 1px solid var(--or);
    border-radius: 20px;
    padding: 4px 12px;
    color: var(--or-clair);
    text-align: center;
  }

  /* ─ PLATEAU ─ */
  .plateau {
    background: linear-gradient(160deg, #6B3410, #4A2008, #3D1A05);
    border: 3px solid var(--terre-clair);
    border-radius: 20px;
    padding: 20px 16px;
    box-shadow: 0 8px 40px var(--ombre), inset 0 2px 0 rgba(212,160,23,0.15);
    position: relative;
  }

  .label-camp {
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.6;
  }
  .label-camp.nord { color: #7BB3D4; }
  .label-camp.sud  { color: #E8A05A; margin-top: 8px; margin-bottom: 0; }

  .rangee {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 4px 0;
  }

  .case {
    width: 72px;
    height: 72px;
    background: radial-gradient(circle at 40% 35%, #8B5E3C, #4A2008);
    border: 2px solid var(--terre);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    position: relative;
    transition: all 0.2s;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
  }

  .case .nb-graines {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--or-clair);
    line-height: 1;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  .case .num-case {
    font-size: 0.58rem;
    color: rgba(245,230,200,0.4);
    margin-top: 2px;
  }

  .case.jouable {
    cursor: pointer;
    border-color: var(--or);
    background: radial-gradient(circle at 40% 35%, #A0723A, #5C2E0A);
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.3), 0 0 12px rgba(212,160,23,0.35), 0 2px 6px rgba(0,0,0,0.3);
    animation: pulse-or 1.8s ease-in-out infinite;
  }

  @keyframes pulse-or {
    0%, 100% { box-shadow: inset 0 3px 8px rgba(0,0,0,0.3), 0 0 12px rgba(212,160,23,0.35); }
    50%       { box-shadow: inset 0 3px 8px rgba(0,0,0,0.3), 0 0 22px rgba(212,160,23,0.65); }
  }

  .case.jouable:hover {
    transform: scale(1.08);
    border-color: var(--or-clair);
  }

  .case.vide .nb-graines { color: rgba(245,230,200,0.2); }

  .case.dernier {
    border-color: #E74C3C;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.3), 0 0 15px rgba(231,76,60,0.5);
  }

  .separateur {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--terre-clair), transparent);
    margin: 8px 16px;
    border-radius: 1px;
  }

  /* ─ MESSAGE ─ */
  .message-jeu {
    margin-top: 14px;
    padding: 10px 16px;
    background: rgba(0,0,0,0.3);
    border-left: 3px solid var(--or);
    border-radius: 0 8px 8px 0;
    font-size: 0.88rem;
    color: var(--sable-fonce);
    min-height: 38px;
    line-height: 1.5;
  }

  /* ─ ATTENTE ─ */
  .attente-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(212,160,23,0.1);
    border: 1px solid var(--or);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.82rem;
    color: var(--or-clair);
    margin-bottom: 14px;
  }

  .dot-anim {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--or-clair);
    animation: clignoter 1.2s ease-in-out infinite;
  }

  @keyframes clignoter {
    0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
  }

  /* ─ FIN DE PARTIE ─ */
  #overlay-fin {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #overlay-fin.actif { display: flex; }

  .carte-fin {
    background: linear-gradient(135deg, var(--bois-moyen), #1A0A00);
    border: 2px solid var(--or);
    border-radius: 20px;
    padding: 40px 48px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    max-width: 360px;
  }

  .carte-fin .trophee { font-size: 3.5rem; margin-bottom: 12px; }
  .carte-fin h2 { font-family: 'Cinzel Decorative', serif; color: var(--or-clair); font-size: 1.4rem; margin-bottom: 8px; }
  .carte-fin p  { color: var(--sable-fonce); font-size: 0.9rem; margin-bottom: 24px; }

  .indicateur-role {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .indicateur-role.sud  { background: rgba(196,119,42,0.2); border: 1px solid var(--terre-clair); color: var(--terre-clair); }
  .indicateur-role.nord { background: rgba(26,82,118,0.2); border: 1px solid #5DADE2; color: #7BB3D4; }

  #id-partie-display {
    font-size: 0.75rem;
    color: var(--or);
    opacity: 0.6;
    margin-top: 4px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<h1>SONGO</h1>
<p class="subtitle">Jeu Traditionnel Africain — Version en Ligne</p>

<!-- ÉCRAN CONNEXION -->
<div id="ecran-connexion">
  <h2>Rejoindre une Partie</h2>

  <div class="champ-groupe">
    <label>ID de la partie</label>
    <input type="text" id="input-partie-id" placeholder="Ex: partie123" maxlength="20"/>
  </div>

  <div class="champ-groupe">
    <label>Votre camp</label>
    <select id="select-joueur">
      <option value="SUD">SUD (rangée du bas)</option>
      <option value="NORD">NORD (rangée du haut)</option>
    </select>
  </div>

  <button class="btn-primaire" onclick="rejoindre()">Rejoindre la partie</button>

  <p class="aide-connexion">
    Donnez le même ID à votre adversaire.<br/>
    Un joueur prend SUD, l'autre prend NORD.
  </p>
</div>

<!-- ÉCRAN JEU -->
<div id="ecran-jeu">
  <div style="text-align:center; margin-bottom:8px;">
    <div id="indicateur-role" class="indicateur-role"></div>
    <div id="id-partie-display"></div>
  </div>

  <div id="badge-attente" class="attente-badge">
    <span class="dot-anim"></span>
    En attente de l'adversaire…
  </div>

  <div class="infos-jeu">
    <div class="badge-joueur nord">
      <span class="point"></span>
      <span>NORD</span>
      <strong id="score-nord">0</strong>
    </div>
    <div class="badge-score" id="badge-score-centre">— : —</div>
    <div class="badge-joueur sud">
      <span>SUD</span>
      <strong id="score-sud">0</strong>
      <span class="point"></span>
    </div>
  </div>

  <div class="plateau">
    <!-- NORD (rangée du haut — cases 13→7, affichées case1→case7 vu par NORD) -->
    <p class="label-camp nord">◂ NORD ▸</p>
    <div class="rangee" id="rangee-nord"></div>
    <div class="separateur"></div>
    <!-- SUD (rangée du bas — cases 0→6, affichées case1→case7 vu par SUD) -->
    <div class="rangee" id="rangee-sud"></div>
    <p class="label-camp sud">◂ SUD ▸</p>
  </div>

  <div class="message-jeu" id="message-jeu">En attente de la partie…</div>
</div>

<!-- OVERLAY FIN -->
<div id="overlay-fin">
  <div class="carte-fin">
    <div class="trophee">🏆</div>
    <h2 id="fin-titre">Partie terminée</h2>
    <p id="fin-message"></p>
    <button class="btn-primaire" onclick="location.reload()">Nouvelle partie</button>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SERVEUR = window.location.origin; // même origine que le serveur
const POLL_MS = 1500; // polling toutes les 1.5s

let monJoueur = null;
let partieId = null;
let intervalPoll = null;
let dernierEtat = null;

// ─── CONNEXION ────────────────────────────────────────────────────────────────
async function rejoindre() {
  partieId = document.getElementById('input-partie-id').value.trim();
  monJoueur = document.getElementById('select-joueur').value;

  if (!partieId) { alert('Entrez un ID de partie'); return; }

  try {
    const rep = await fetch(`${SERVEUR}/api/rejoindre`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ partieId, joueur: monJoueur })
    });
    const data = await rep.json();
    if (data.erreur) { alert(data.erreur); return; }

    // Afficher l'écran de jeu
    document.getElementById('ecran-connexion').style.display = 'none';
    document.getElementById('ecran-jeu').style.display = 'block';

    const roleEl = document.getElementById('indicateur-role');
    roleEl.textContent = `Vous jouez : ${monJoueur}`;
    roleEl.className = `indicateur-role ${monJoueur.toLowerCase()}`;
    document.getElementById('id-partie-display').textContent = `Partie : ${partieId}`;

    appliquerEtat(data);

    // Démarrer le polling Ajax
    intervalPoll = setInterval(pollEtat, POLL_MS);

  } catch(e) {
    alert('Impossible de contacter le serveur. Vérifiez que le serveur est lancé.');
  }
}

// ─── POLLING AJAX ─────────────────────────────────────────────────────────────
async function pollEtat() {
  try {
    const rep = await fetch(`${SERVEUR}/api/etat/${partieId}/${monJoueur}`);
    const data = await rep.json();
    if (data.erreur) return;
    appliquerEtat(data);
  } catch(e) { /* serveur temporairement inaccessible */ }
}

// ─── APPLIQUER L'ÉTAT AU DOM ──────────────────────────────────────────────────
function appliquerEtat(etat) {
  dernierEtat = etat;

  // Scores
  document.getElementById('score-sud').textContent = etat.scores.SUD;
  document.getElementById('score-nord').textContent = etat.scores.NORD;
  document.getElementById('badge-score-centre').textContent =
    `${etat.scores.NORD} : ${etat.scores.SUD}`;

  // Attente
  const badgeAttente = document.getElementById('badge-attente');
  badgeAttente.style.display = etat.statut === 'attente' ? 'inline-flex' : 'none';

  // Message
  document.getElementById('message-jeu').textContent = etat.message || '';

  // Tour
  const cEstMonTour = etat.statut === 'en_cours' && etat.tour === monJoueur;

  // Rendu rangées
  afficherRangeeNord(etat.plateau, cEstMonTour);
  afficherRangeeSud(etat.plateau, cEstMonTour);

  // Fin de partie
  if (etat.statut === 'termine') {
    clearInterval(intervalPoll);
    document.getElementById('fin-titre').textContent = '— Fin de Partie —';
    document.getElementById('fin-message').textContent = etat.fin;
    document.getElementById('overlay-fin').classList.add('actif');
  }
}

// NORD : cases index [13, 12, 11, 10, 9, 8, 7] (case1→case7 vu par NORD)
function afficherRangeeNord(plateau, cEstMonTour) {
  const rangee = document.getElementById('rangee-nord');
  rangee.innerHTML = '';
  const indices = [13, 12, 11, 10, 9, 8, 7]; // case1 NORD = idx 13
  for (let i = 0; i < 7; i++) {
    const idx = indices[i];
    const graines = plateau[idx];
    const estJouable = monJoueur === 'NORD' && cEstMonTour && graines > 0;
    const div = creerCase(idx, graines, i + 1, estJouable);
    rangee.appendChild(div);
  }
}

// SUD : cases index [0, 1, 2, 3, 4, 5, 6] (case1→case7 vu par SUD)
// Mais affiché en miroir : SUD voit sa rangée de droite à gauche par rapport au plateau
// case 7 SUD (idx 6) est à droite, case 1 SUD (idx 0) est à gauche vu par SUD
// On affiche [0, 1, 2, 3, 4, 5, 6] = case1 à gauche pour SUD
function afficherRangeeSud(plateau, cEstMonTour) {
  const rangee = document.getElementById('rangee-sud');
  rangee.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const idx = i; // 0=case1, 6=case7
    const graines = plateau[idx];
    const estJouable = monJoueur === 'SUD' && cEstMonTour && graines > 0;
    const div = creerCase(idx, graines, i + 1, estJouable);
    rangee.appendChild(div);
  }
}

function creerCase(idx, graines, numCase, estJouable) {
  const div = document.createElement('div');
  div.className = 'case' + (graines === 0 ? ' vide' : '') + (estJouable ? ' jouable' : '');
  div.innerHTML = `
    <span class="nb-graines">${graines}</span>
    <span class="num-case">${numCase}</span>
  `;
  if (estJouable) {
    div.addEventListener('click', () => jouerCoup(idx));
    div.title = `Semer depuis la case ${numCase}`;
  }
  return div;
}

// ─── JOUER UN COUP ────────────────────────────────────────────────────────────
async function jouerCoup(caseIndex) {
  if (!dernierEtat || dernierEtat.tour !== monJoueur) return;

  try {
    const rep = await fetch(`${SERVEUR}/api/jouer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ partieId, joueur: monJoueur, caseIndex })
    });
    const data = await rep.json();
    if (data.erreur) {
      document.getElementById('message-jeu').textContent = '⚠ ' + data.erreur;
      return;
    }
    appliquerEtat(data);
  } catch(e) {
    alert('Erreur réseau. Réessayez.');
  }
}

// ─── ENTER sur le champ ID ────────────────────────────────────────────────────
document.getElementById('input-partie-id').addEventListener('keyup', e => {
  if (e.key === 'Enter') rejoindre();
});
</script>
</body>
</html>
